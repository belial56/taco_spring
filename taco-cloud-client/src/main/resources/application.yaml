server:
  port: 8081
spring:
  application:
    name=taco-cloud-client
  security:
    oauth2:
      client:
        registration:
          taco-admin-client:
            provider: tacocloud
            client-id: tacocloud-client
            client-secret: my_custom_secret
            authorization-grant-type: authorization_code
            redirect-uri:
              "http://127.0.0.1:9090/login/oauth2/code/{registrationId}"
            scope:
              writeIngredients,deleteIngredients,openid
        provider:
          tacocloud:
            issuer-uri: http://localhost:9000
  kafka:
    bootstrap-servers:
      localhost:9092
